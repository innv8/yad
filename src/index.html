<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yet another Downloader</title>
</head>

<body>
  <main class="container py-3">

    <!-- Header bar -->
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div class="d-flex align-items-center gap-2">
        <img src="assets/favicon.png" alt="" width="28" height="28" class="app-logo" />
        <span class="app-title h5 mb-0">YAD</span>
      </div>
      <div class="theme-toggle">
        <span><i class="fa fa-moon-o theme-icon" id="dark-button" title="Dark mode"></i></span>
        <span><i class="fa fa-sun-o theme-icon" id="light-button" title="Light mode"></i></span>
      </div>
    </div>

    <!-- URL input row -->
    <div class="row g-2 mb-2 align-items-end">
      <div class="col-12 col-sm">
        <div class="input-group">
          <input type="text" id="search" class="form-control" placeholder="Paste a URL and press Enter, or paste directly" />
          <button class="btn btn-outline-secondary" id="pick-dir-btn" title="Choose download folder">
            <i class="fa fa-folder-open"></i>
          </button>
          <span id="dir-label" class="input-group-text d-none small"></span>
        </div>
      </div>
      <div class="col-auto">
        <button id="download-btn" class="btn btn-primary">
          <i class="fa fa-download me-1"></i> Download
        </button>
      </div>
    </div>

    <!-- Filter row -->
    <div class="row mb-2">
      <div class="col-12 col-md-6">
        <input type="text" id="filter-input" class="form-control form-control-sm" placeholder="Filter downloads…" />
      </div>
      <div class="col-auto ms-auto d-flex align-items-center gap-2" id="bulk-bar" style="display:none !important;">
        <span class="small text-muted" id="selected-count">0 selected</span>
        <button class="btn btn-sm btn-outline-success" id="retry-selected-btn">
          <i class="fa fa-play"></i> Retry
        </button>
        <button class="btn btn-sm btn-outline-danger" id="delete-selected-btn">
          <i class="fa fa-trash"></i> Delete
        </button>
      </div>
    </div>

    <!-- Empty state (shown when no downloads) -->
    <div id="empty-state" class="text-center py-5" style="display:none;">
      <i class="fa fa-download fa-3x text-muted mb-3"></i>
      <p class="text-muted">No downloads yet.<br />Paste a URL above to get started.</p>
    </div>

    <!-- Downloads table -->
    <div class="table-responsive">
      <table class="table table-striped table-hover mb-0" id="downloads-table">
        <thead>
          <tr>
            <th class="col-select" data-sort="none">
              <input type="checkbox" id="select-all" aria-label="Select all" />
            </th>
            <th class="col-file" data-sort="file_name">
              File <i class="fa fa-sort"></i>
            </th>
            <th class="col-size" data-sort="file_size">
              Size <i class="fa fa-sort"></i>
            </th>
            <th class="col-progress" data-sort="progress">
              Progress <i class="fa fa-sort"></i>
            </th>
            <th class="col-type" data-sort="file_type">
              Type <i class="fa fa-sort"></i>
            </th>
            <th class="col-date" data-sort="download_start_time">
              Date <i class="fa fa-sort"></i>
            </th>
            <th class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody class="table-group-divider" id="download-records">
        </tbody>
      </table>
    </div>

    <!-- Statistics footer -->
    <div id="stats-bar" class="d-flex flex-wrap align-items-center justify-content-between mt-2 small text-muted">
      <span id="stats-text"></span>
      <button class="btn btn-sm btn-outline-secondary" id="clear-completed-btn">Clear completed</button>
    </div>

  </main>

  <!-- Context menu -->
  <div id="context-menu" class="context-menu" style="display:none;">
    <div class="context-item" data-action="open">Open file</div>
    <div class="context-item" data-action="open-folder">Open containing folder</div>
    <div class="context-item" data-action="copy-url">Copy URL</div>
    <div class="dropdown-divider"></div>
    <div class="context-item" data-action="retry">Retry</div>
    <div class="context-item" data-action="cancel">Cancel</div>
    <div class="dropdown-divider"></div>
    <div class="context-item text-danger" data-action="delete">Delete</div>
  </div>

  <!-- Rename modal (Bootstrap-based) -->
  <div class="modal fade" id="rename-modal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h6 class="modal-title">File name</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="text" id="rename-input" class="form-control" />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-sm btn-primary" id="rename-confirm">Start download</button>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
