name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CURRENT=$(jq -r '.version' src-tauri/tauri.conf.json)
          BASE="${CURRENT%%-*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping ${CURRENT} → ${NEW_VERSION}"

          jq ".version = \"$NEW_VERSION\"" src-tauri/tauri.conf.json > /tmp/tc.json
          mv /tmp/tc.json src-tauri/tauri.conf.json

          sed -i 's/^version = ".*"/version = "'"$NEW_VERSION"'"/' src-tauri/Cargo.toml

          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push --tags
          git push origin main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body: "Automated release for version ${{ steps.bump.outputs.version }}."
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: yad-macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: yad-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install npm deps
        run: npm install

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          SRC="src-tauri/target/${{ matrix.target }}/release/yad"
          if [ ! -f "$SRC" ]; then
            echo "Binary not found at $SRC" >&2
            ls -la "src-tauri/target/${{ matrix.target }}/release/" || true
            exit 1
          fi
          DEST="${{ matrix.binary_name }}-v${VERSION}"
          cp "$SRC" "$DEST"
          chmod +x "$DEST"
          echo "binary=$DEST" >> "$GITHUB_ENV"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          files: ${{ env.binary }}
          token: ${{ secrets.GITHUB_TOKEN }}
